<!-- Toolbar: 42px, grouped tools -->
<div class="tool-group" role="group" aria-label="Navigation">
  <button class="tool-btn active" data-tool="pan-zoom" aria-pressed="true" title="Pan / Zoom (P)">
    ✋ Pan/Zoom <span class="tool-key">P</span>
  </button>
  <button class="tool-btn" data-tool="wl" aria-pressed="false" title="Window / Level (W)">
    🌗 W/L <span class="tool-key">W</span>
  </button>
</div>

<div class="tool-group" role="group" aria-label="Measurements">
  <button class="tool-btn" data-tool="length" aria-pressed="false" title="Distance (D)">
    📏 Distance <span class="tool-key">D</span>
  </button>
  <button class="tool-btn" data-tool="angle" aria-pressed="false" title="Angle (A)">
    📐 Angle <span class="tool-key">A</span>
  </button>
  <button class="tool-btn" data-tool="roi" aria-pressed="false" title="ROI (R)">
    ⭕ ROI <span class="tool-key">R</span>
  </button>
</div>

<div class="tool-group" role="group" aria-label="Playback">
  <button class="tool-btn" id="btn-cine-play" title="Play / Pause (Space)">
    ▶ Play <span class="tool-key">␣</span>
  </button>
</div>

<div style="margin-left:auto;">
  <button class="tool-btn" id="btn-toggle-drawer" title="Toggle Right Panel" aria-expanded="true" aria-controls="app-drawer">
    📋 Info
  </button>
</div>
