<div id="status-panel" class="status-bar" style="display:none;">
    <!-- Status messages injected here -->
</div>

<!-- Safety Verification Modal / Actions -->
<div id="export-actions" style="display:none; margin-top:1rem; flex-direction:column; gap:0.5rem;">
  
  <div class="clinical-modal" id="verification-modal" role="dialog" aria-labelledby="verify-heading">
    <strong id="verify-heading" style="color:var(--text-main); font-size:14px;">Confirm Clinical Export</strong>
    <p style="font-size:12px; color:var(--text-muted); margin:0;">
      Original file will remain unmodified. Cleaned file will be saved.
    </p>
    <label class="checkbox-confirm">
      <input type="checkbox" id="chk-verify" aria-label="Acknowledge clinical verification" />
      I have manually verified these annotations against the original scan.
    </label>
    <div style="display:flex; gap:0.5rem; margin-top:0.5rem;">
      <button id="btn-cancel-clean" class="action-btn" style="flex:1;">Cancel / Undo</button>
      <button id="btn-commit-clean" class="action-btn primary" style="flex:1;" disabled>Confirm & Download</button>
    </div>
  </div>
  
  <div id="download-actions" style="display:none; gap:0.5rem; margin-top:0.5rem;">
      <button id="btn-download-png" class="action-btn" style="flex:1;">⬇ Download PNG</button>
      <button id="btn-download-dcm" class="action-btn" style="flex:1;">⬇ Download DICOM</button>
  </div>
</div>
