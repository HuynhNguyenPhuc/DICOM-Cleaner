<!-- Viewer Container -->
<div id="comp-viewer" style="position:relative; width:100%; height:100%;" tabindex="0">
  <!-- Canvas Layers -->
  <canvas id="gl-orig" class="canvas-layer" style="z-index:10;"></canvas>
  <div id="overlay-clipper" style="position:absolute; inset:0; z-index:15; clip-path:polygon(50% 0,100% 0,100% 100%,50% 100%);">
    <canvas id="gl-clean" class="canvas-layer"></canvas>
  </div>

  <!-- Comparison Slider -->
  <div id="viewer-handle" class="viewer-handle" role="slider" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Comparison slider" tabindex="0"></div>

  <!-- SVG Measurement Layer -->
  <svg id="measurement-svg" class="svg-layer"></svg>

  <!-- Corner Overlays -->
  <div class="info-overlay bl">
    <div id="readout-zoom">Zoom: 100%</div>
    <div id="readout-probe">X: — Y: —</div>
  </div>
  <div class="info-overlay br">
    <div id="readout-wl">WL: 128 / 256</div>
  </div>

  <!-- Empty State -->
  <div id="viewer-empty-state" class="viewer-empty">
    <div class="viewer-empty-icon">🩻</div>
    <div class="viewer-empty-text">Drop a DICOM file to begin</div>
  </div>
</div>
