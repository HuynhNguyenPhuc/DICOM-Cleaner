<div class="metadata-drawer">
  <details class="collapse-block" open>
    <summary class="drawer-title" style="border-bottom:1px solid var(--bg-border); padding-bottom:0.5rem; margin-bottom:0.5rem;">
      DICOM Metadata
    </summary>
  
  <div id="metadata-content" style="display:flex; flex-direction:column; gap:0.5rem;">
    <div class="metadata-row"><strong>Patient Name</strong> <span id="meta-patient">Tran Thi T******</span></div>
    <div class="metadata-row"><strong>Study Date</strong> <span id="meta-date">--</span></div>
    <div class="metadata-row"><strong>Modality</strong> <span id="meta-modality">US</span></div>
    <div class="metadata-row"><strong>Image Size</strong> <span id="meta-size">--</span></div>
    <div class="metadata-row"><strong>Color Space</strong> <span id="meta-color">--</span></div>
    <div class="metadata-row"><strong>Window Center</strong> <span id="meta-wc">--</span></div>
    <div class="metadata-row"><strong>Window Width</strong> <span id="meta-ww">--</span></div>
    <div class="metadata-row"><strong>Pixel Spacing</strong> <span id="meta-spacing">--</span></div>
  </div>
  </details>

  <div style="margin-top:auto; font-size:10px; color:var(--text-muted); border-top:1px solid var(--bg-border); padding-top:1rem;">
    <button class="action-btn" style="width:100%; font-size:11px; padding:4px;" onclick="alert('Operation Log Export Placeholder')">Download Operation Log JSON</button>
  </div>
</div>
